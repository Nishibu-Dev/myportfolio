<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Nishibu Anna Photography</title>
    <meta name="description" content="Explore beautiful nature galleries categorized by genres: Forests, Winter, Waterscapes, Flora, and Abstract by Nishibu Anna.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="images/logo.png" alt="Nishibu Anna Photography Logo">
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" id="nav-home">Home</a></li>
                <li><a href="gallery.html?genre=forest" id="nav-forest">Forests</a></li>
                <li><a href="gallery.html?genre=winter" id="nav-winter">Winter</a></li>
                <li><a href="gallery.html?genre=water" id="nav-water">Waterscapes</a></li>
                <li><a href="gallery.html?genre=flora" id="nav-flora">Flora</a></li>
                <li><a href="gallery.html?genre=abstract" id="nav-abstract">Abstract</a></li>
                <li><a href="about.html" id="nav-about">About & Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="gallery-header fade-in">
            <h1 id="gallery-title">Gallery</h1>
            <p id="gallery-subtitle">Selected Works</p>
        </div>

        <div id="gallery-grid" class="gallery-grid fade-in">
            <!-- Dynamically populated by main.js -->
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" aria-label="Close lightbox">&times;</button>
        <button class="lightbox-nav lightbox-prev" aria-label="Previous image">&#10216;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" class="lightbox-img" src="" alt="Full-screen preview">
            <div class="lightbox-caption">
                <h3 id="lightbox-title" class="lightbox-title"></h3>
                <p id="lightbox-desc" class="lightbox-desc"></p>
            </div>
        </div>
        <button class="lightbox-nav lightbox-next" aria-label="Next image">&#10217;</button>
    </div>

    <footer>
        <p class="footer-text">&copy; 2026 Nishibu Anna. All Rights Reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
