<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Minimalist Geometric Emblem (Combination of N and A) -->
  <g transform="translate(100, 80)" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer delicate thin circle -->
    <circle cx="0" cy="0" r="42" stroke="#e5e5e5" stroke-width="0.8" stroke-dasharray="3 3"/>
    
    <!-- The "N" part (Elegant and sharp lines) -->
    <path d="-18,22 L-18,-22 L18,22 L18,-22" opacity="0.9"/>
    
    <!-- The "A" part (Crossing elegant lines) -->
    <path d="-22,22 L0,-28 L22,22" stroke-width="1" opacity="0.85"/>
    
    <!-- Crossbar of A -->
    <line x1="-10" y1="10" x2="10" y2="10" stroke-width="0.8"/>
    
    <!-- Delicate central camera/focus symbol -->
    <circle cx="0" cy="-3" r="7" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="-3" r="1.5" fill="#1a1a1a" stroke="none"/>
  </g>
  
  <!-- Brand Text -->
  <text x="100" y="152" font-family="'Cormorant Garamond', 'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="14" font-weight="300" fill="#1a1a1a" text-anchor="middle" letter-spacing="5">NISHIBU ANNA</text>
  <text x="100" y="172" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="7" font-weight="300" fill="#767676" text-anchor="middle" letter-spacing="4">PHOTOGRAPHY</text>
</svg>
